<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel TCI 2026 – 2º BPM/I</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&family=Exo+2:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red:      #c0152b;
      --gold:     #c9a227;
      --silver:   #b8c0cc;
      --dark:     #0d0f14;
      --panel:    #14181f;
      --neon-red: #ff2244;
      --neon-blu: #1e90ff;
      --neon-gld: #ffd700;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Exo 2', sans-serif;
      overflow: hidden;
    }

    /* animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(0deg,   transparent, transparent 59px, rgba(30,144,255,.04) 60px),
        repeating-linear-gradient(90deg,  transparent, transparent 59px, rgba(30,144,255,.04) 60px);
      pointer-events: none;
      z-index: 0;
    }

    /* scanlines overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,.18) 3px,
        rgba(0,0,0,.18) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    .card {
      position: relative;
      z-index: 2;
      width: 420px;
      background: linear-gradient(160deg, #1a1f2c 0%, #0d1017 100%);
      border: 1px solid rgba(200,162,39,.25);
      border-radius: 18px;
      padding: 36px 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;

      /* outer gold glow */
      box-shadow:
        0 0 0 1px rgba(201,162,39,.15),
        0 0 40px rgba(201,162,39,.12),
        0 8px 60px rgba(0,0,0,.8),
        inset 0 1px 0 rgba(255,255,255,.06);
    }

    /* top accent bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 2px;
    }

    /* ── hero image ── */
    .hero-wrapper {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 30px rgba(0,0,0,.6);
    }

    .hero-wrapper img {
      width: 100%;
      display: block;
      filter: brightness(.93) contrast(1.05);
    }

    /* title overlay */
    .hero-title {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 14px 16px 10px;
      background: linear-gradient(to bottom, rgba(0,0,0,.78) 60%, transparent);
      text-align: center;
    }

    .hero-title span {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #fff;
      text-shadow:
        0 0 10px var(--neon-blu),
        0 0 24px rgba(30,144,255,.55),
        0 2px 4px rgba(0,0,0,.9);
    }

    /* ── divider ── */
    .divider {
      width: 80%;
      height: 1px;
      margin: 26px 0 22px;
      background: linear-gradient(90deg, transparent, rgba(201,162,39,.5), transparent);
    }

    /* ── buttons ── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 100%;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      position: relative;
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
      outline: none;
      user-select: none;
    }

    /* ── Video Instrução (neon blue) ── */
    .btn-video {
      background: linear-gradient(135deg, #0a1a33 0%, #0e2244 100%);
      color: #7ec8ff;
      border: 1.5px solid rgba(30,144,255,.5);
      box-shadow:
        0 0 8px  rgba(30,144,255,.45),
        0 0 20px rgba(30,144,255,.25),
        0 0 45px rgba(30,144,255,.12),
        inset 0 0 12px rgba(30,144,255,.08);
    }

    .btn-video:hover {
      transform: translateY(-3px) scale(1.015);
      box-shadow:
        0 0 14px rgba(30,144,255,.8),
        0 0 35px rgba(30,144,255,.5),
        0 0 65px rgba(30,144,255,.25),
        inset 0 0 20px rgba(30,144,255,.15);
      color: #cceeff;
      filter: brightness(1.15);
    }

    .btn-video:active { transform: translateY(0) scale(.99); }

    /* ── Controle de Treinamento (neon red) ── */
    .btn-ctrl {
      background: linear-gradient(135deg, #1e0a0a 0%, #2d0d0d 100%);
      color: #ff8899;
      border: 1.5px solid rgba(255,34,68,.5);
      box-shadow:
        0 0 8px  rgba(255,34,68,.45),
        0 0 20px rgba(255,34,68,.25),
        0 0 45px rgba(255,34,68,.12),
        inset 0 0 12px rgba(255,34,68,.08);
    }

    .btn-ctrl:hover {
      transform: translateY(-3px) scale(1.015);
      box-shadow:
        0 0 14px rgba(255,34,68,.8),
        0 0 35px rgba(255,34,68,.5),
        0 0 65px rgba(255,34,68,.25),
        inset 0 0 20px rgba(255,34,68,.15);
      color: #ffc0cc;
      filter: brightness(1.15);
    }

    .btn-ctrl:active { transform: translateY(0) scale(.99); }

    /* icon inside button */
    .btn-icon {
      margin-right: 10px;
      font-size: 1.2em;
      vertical-align: middle;
    }

    /* ── footer ── */
    .footer {
      margin-top: 28px;
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(184,192,204,.3);
      text-align: center;
    }

    /* pulse ring animation on card */
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(201,162,39,.18), 0 0 40px rgba(201,162,39,.12), 0 8px 60px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.06); }
      50%  { box-shadow: 0 0 0 6px rgba(201,162,39,.06), 0 0 55px rgba(201,162,39,.2),  0 8px 60px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.06); }
      100% { box-shadow: 0 0 0 0 rgba(201,162,39,.18), 0 0 40px rgba(201,162,39,.12), 0 8px 60px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.06); }
    }

    .card { animation: pulse-ring 4s ease-in-out infinite; }

    /* flicker on title */
    @keyframes flicker {
      0%,100% { opacity:1; }
      92%      { opacity:1; }
      93%      { opacity:.7; }
      94%      { opacity:1; }
      97%      { opacity:.85; }
      98%      { opacity:1; }
    }
    .hero-title span { animation: flicker 6s infinite; }
  </style>
</head>
<body>

<div class="card">

  <div class="hero-wrapper">
    <img
      src="https://raw.githubusercontent.com/SEU_USUARIO/SEU_REPOSITORIO/main/Gemini_Generated_Image_s8li6ms8li6ms8li.png"
      alt="Brasão 2º BPM/I – Polícia Militar São Paulo"
      onerror="this.style.opacity='.4'"
    />
    <div class="hero-title">
      <span>Painel TCI 2026</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="btn-group">
    <a
      class="btn btn-video"
      href="https://5ciapm.github.io/treinamentotci/"
      target="_blank"
      rel="noopener noreferrer"
    >
      <span class="btn-icon">▶</span>Vídeo Instrução
    </a>

    <a
      class="btn btn-ctrl"
      href="https://forms.gle/3oy7aJxm5Fjba2XT7"
      target="_blank"
      rel="noopener noreferrer"
    >
      <span class="btn-icon">📋</span>Controle de Treinamento
    </a>
  </div>

  <div class="footer">2º BPM/I &nbsp;·&nbsp; Polícia Militar &nbsp;·&nbsp; São Paulo</div>

</div>

</body>
</html>
