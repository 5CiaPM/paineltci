<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2º BPM/I — Polícia Militar · São Paulo</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:       #c0000c;
      --red-dark:  #8a0008;
      --red-glow:  rgba(192, 0, 12, 0.55);
      --black:     #0a0a0b;
      --gray-900:  #111214;
      --gray-800:  #1a1c1f;
      --gray-700:  #252729;
      --gray-600:  #333538;
      --gray-400:  #8a8d93;
      --gray-200:  #c8cbd0;
      --white:     #f0f2f5;
      --gold:      #c9a84c;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      background-color: var(--black);
      font-family: 'Rajdhani', sans-serif;
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── WATERMARK BACKGROUND ── */
    .watermark {
      position: fixed;
      inset: 0;
      background-image: url('https://raw.githubusercontent.com/SEU-USUARIO/SEU-REPO/main/Gemini_Generated_Image_s8li6ms8li6ms8li.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center center;
      opacity: 0.07;
      filter: grayscale(100%) contrast(1.2);
      z-index: 0;
      pointer-events: none;
    }

    /* ── GRID OVERLAY ── */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(192,0,12,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192,0,12,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── AMBIENT LIGHT ── */
    .ambient {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(192,0,12,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 50% 100%, rgba(192,0,12,0.07) 0%, transparent 60%);
    }

    /* ── MAIN CARD ── */
    .card {
      position: relative;
      z-index: 10;
      width: min(480px, 94vw);
      background: linear-gradient(160deg, var(--gray-800) 0%, var(--gray-900) 60%, #0d0e10 100%);
      border: 1px solid var(--gray-600);
      border-radius: 4px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 40px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(192,0,12,0.08);
      animation: cardIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    /* ── TOP STRIPE ── */
    .stripe {
      height: 5px;
      background: linear-gradient(90deg, var(--red-dark), var(--red), #ff2030, var(--red), var(--red-dark));
      background-size: 200% 100%;
      animation: stripeShift 4s linear infinite;
    }

    @keyframes stripeShift {
      0%   { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    /* ── HEADER ── */
    .header {
      padding: 36px 32px 28px;
      text-align: center;
      position: relative;
      border-bottom: 1px solid var(--gray-700);
    }

    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(192,0,12,0.12), transparent 70%);
      pointer-events: none;
    }

    .badge-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 2px solid var(--gray-600);
      background: radial-gradient(circle, var(--gray-700) 0%, var(--gray-900) 100%);
      box-shadow: 0 0 0 4px rgba(192,0,12,0.15), 0 8px 24px rgba(0,0,0,0.5);
      margin-bottom: 20px;
      position: relative;
      animation: badgePulse 3s ease-in-out infinite;
    }

    @keyframes badgePulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(192,0,12,0.15), 0 8px 24px rgba(0,0,0,0.5); }
      50%       { box-shadow: 0 0 0 8px rgba(192,0,12,0.25), 0 8px 32px rgba(0,0,0,0.5); }
    }

    .badge-img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      filter: drop-shadow(0 0 10px rgba(192,0,12,0.5));
    }

    .badge-icon {
      font-size: 38px;
      filter: drop-shadow(0 0 8px rgba(192,0,12,0.6));
    }

    .org-label {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 8px;
      opacity: 0.9;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(28px, 8vw, 40px);
      letter-spacing: 2px;
      line-height: 1;
      color: var(--white);
      text-shadow: 0 0 30px rgba(255,255,255,0.1);
      margin-bottom: 4px;
    }

    .subtitle {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(18px, 5vw, 24px);
      letter-spacing: 4px;
      color: var(--red);
      text-shadow: 0 0 20px var(--red-glow);
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 16px;
    }

    .meta-pill {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray-400);
      padding: 4px 12px;
      border: 1px solid var(--gray-600);
      border-radius: 2px;
      background: rgba(255,255,255,0.02);
    }

    .divider-line {
      width: 40px;
      height: 1px;
      background: var(--gray-600);
    }

    /* ── BUTTONS SECTION ── */
    .buttons-section {
      padding: 32px 32px 36px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 24px;
      border-radius: 3px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover  { transform: translateY(-2px); }
    .btn:active { transform: translateY(1px) scale(0.99); }

    /* PRIMARY — Videos Instrução */
    .btn-primary {
      background: linear-gradient(135deg, var(--red-dark) 0%, var(--red) 50%, #e8000d 100%);
      box-shadow: 0 4px 20px rgba(192,0,12,0.4), 0 1px 0 rgba(255,255,255,0.1) inset;
    }

    .btn-primary:hover {
      box-shadow: 0 8px 32px rgba(192,0,12,0.6), 0 1px 0 rgba(255,255,255,0.1) inset;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .btn-primary:hover::before { transform: translateX(100%); }

    /* SECONDARY — Controle de Treinamento */
    .btn-secondary {
      background: linear-gradient(135deg, var(--gray-700) 0%, var(--gray-800) 100%);
      border: 1px solid var(--gray-600);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.05) inset;
    }

    .btn-secondary:hover {
      border-color: var(--red);
      box-shadow: 0 4px 20px rgba(192,0,12,0.2), 0 0 0 1px rgba(192,0,12,0.3);
    }

    .btn-secondary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(192,0,12,0.05) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .btn-secondary:hover::before { transform: translateX(100%); }

    /* ── ICON BOX ── */
    .btn-icon {
      flex-shrink: 0;
      width: 46px;
      height: 46px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      position: relative;
      z-index: 1;
    }

    .btn-primary .btn-icon {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .btn-secondary .btn-icon {
      background: rgba(192,0,12,0.12);
      border: 1px solid rgba(192,0,12,0.3);
    }

    /* ── BUTTON TEXT ── */
    .btn-text {
      flex: 1;
      text-align: left;
      position: relative;
      z-index: 1;
    }

    .btn-label {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(18px, 5vw, 22px);
      letter-spacing: 1.5px;
      color: var(--white);
      line-height: 1.1;
    }

    .btn-desc {
      display: block;
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-top: 3px;
    }

    /* ── ARROW ── */
    .btn-arrow {
      flex-shrink: 0;
      font-size: 18px;
      color: rgba(255,255,255,0.4);
      position: relative;
      z-index: 1;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .btn:hover .btn-arrow {
      transform: translateX(4px);
      color: rgba(255,255,255,0.8);
    }

    /* ── FOOTER ── */
    .footer {
      padding: 16px 32px 20px;
      border-top: 1px solid var(--gray-700);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .footer-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray-600);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 6px var(--red-glow);
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── SCAN LINE ── */
    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(192,0,12,0.6), transparent);
      animation: scanLine 3.5s linear infinite;
      opacity: 0.5;
      pointer-events: none;
      z-index: 20;
    }

    @keyframes scanLine {
      0%   { top: 0%; }
      100% { top: 100%; }
    }

    /* ── CORNER ACCENTS ── */
    .corner { position: absolute; width: 14px; height: 14px; z-index: 2; }
    .corner-tl { top: 8px; left: 8px; border-top: 2px solid var(--red); border-left: 2px solid var(--red); }
    .corner-tr { top: 8px; right: 8px; border-top: 2px solid var(--red); border-right: 2px solid var(--red); }
    .corner-bl { bottom: 8px; left: 8px; border-bottom: 2px solid var(--red); border-left: 2px solid var(--red); }
    .corner-br { bottom: 8px; right: 8px; border-bottom: 2px solid var(--red); border-right: 2px solid var(--red); }

    /* ── MOBILE ── */
    @media (max-width: 420px) {
      .header    { padding: 28px 20px 22px; }
      .buttons-section { padding: 24px 20px 28px; }
      .footer    { padding: 14px 20px 16px; }
      .badge-wrap { width: 76px; height: 76px; }
      .badge-img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      filter: drop-shadow(0 0 10px rgba(192,0,12,0.5));
    }

    .badge-icon { font-size: 32px; }
    }

    /* ── RIPPLE ── */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transform: scale(0);
      animation: rippleAnim 0.6s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="watermark"></div>
  <div class="grid-overlay"></div>
  <div class="ambient"></div>

  <div class="card">
    <div class="scan-line"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="stripe"></div>

    <!-- HEADER -->
    <div class="header">
      <div class="badge-wrap">
        <img class="badge-img" src="LINK_GITHUB_AQUI" alt="Escudo PMESP" />
      </div>
      <div class="org-label">Estado de São Paulo</div>
      <h1 class="title">Polícia Militar</h1>
      <div class="subtitle">2º BPM/I</div>
      <div class="meta-row">
        <div class="divider-line"></div>
        <span class="meta-pill">São Paulo</span>
        <div class="divider-line"></div>
      </div>
    </div>

    <!-- BUTTONS -->
    <div class="buttons-section">

      <a
        href="https://5ciapm.github.io/treinamentotci"
        target="_blank"
        rel="noopener noreferrer"
        class="btn btn-primary"
        id="btn-videos"
      >
        <div class="btn-icon">▶</div>
        <div class="btn-text">
          <span class="btn-label">Vídeos Instrução</span>
          <span class="btn-desc">Acessar material de treinamento</span>
        </div>
        <span class="btn-arrow">→</span>
      </a>

      <a
        href="https://forms.gle/RxdyZQzJHj3FwNK26"
        target="_blank"
        rel="noopener noreferrer"
        class="btn btn-secondary"
        id="btn-controle"
      >
        <div class="btn-icon">📋</div>
        <div class="btn-text">
          <span class="btn-label">Controle de Treinamento</span>
          <span class="btn-desc">Registrar participação</span>
        </div>
        <span class="btn-arrow">→</span>
      </a>

    </div>

    <!-- FOOTER -->
    <div class="footer">
      <span class="footer-text">Sistema Interno · 2º BPM/I</span>
      <div class="footer-right">
        <span class="footer-text">Online</span>
        <div class="status-dot"></div>
      </div>
    </div>

  </div>

  <script>
    // Ripple effect on buttons
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const r = document.createElement('span');
        r.classList.add('ripple');
        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;`;
        this.appendChild(r);
        setTimeout(() => r.remove(), 700);
      });
    });
  </script>

</body>
</html>
