<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Painel TCI 2026</title>
  <link href="https://github.com/5CiaPM/paineltci/issues/2#issue-4017941202" rel="stylesheet"/>
  <style>
    :root {
      --red:      #c0152b;
      --gold:     #c9a227;
      --dark:     #0b0d12;
      --panel:    #13171f;
      --neon-blu: #1e90ff;
      --neon-red: #ff2244;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--dark);
      font-family: 'Exo 2', sans-serif;
      overflow-x: hidden;
    }

    /* grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        repeating-linear-gradient(0deg,   transparent, transparent 49px, rgba(30,144,255,.04) 50px),
        repeating-linear-gradient(90deg,  transparent, transparent 49px, rgba(30,144,255,.04) 50px);
      pointer-events: none; z-index: 0;
    }

    /* scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,.15) 3px, rgba(0,0,0,.15) 4px
      );
      pointer-events: none; z-index: 1;
    }

    .wrapper {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 28px 20px 36px;
      gap: 0;
    }

    /* ── LOGO ── */
    .logo-wrap {
      width: 110px; height: 110px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(201,162,39,.45);
      box-shadow:
        0 0 0 4px rgba(201,162,39,.1),
        0 0 20px rgba(201,162,39,.3),
        0 0 45px rgba(201,162,39,.12);
      flex-shrink: 0;
      margin-bottom: 14px;
      animation: logo-pulse 4s ease-in-out infinite;
    }

    @keyframes logo-pulse {
      0%,100% { box-shadow: 0 0 0 4px rgba(201,162,39,.1), 0 0 20px rgba(201,162,39,.3),  0 0 45px rgba(201,162,39,.12); }
      50%      { box-shadow: 0 0 0 6px rgba(201,162,39,.18),0 0 30px rgba(201,162,39,.5),  0 0 65px rgba(201,162,39,.22); }
    }

    .logo-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── TITLE ── */
    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.1rem, 5vw, 1.5rem);
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #fff;
      text-align: center;
      text-shadow:
        0 0 10px var(--neon-blu),
        0 0 28px rgba(30,144,255,.55),
        0 2px 4px rgba(0,0,0,.9);
      margin-bottom: 6px;
      animation: flicker 7s infinite;
    }

    .subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(201,162,39,.65);
      text-align: center;
      margin-bottom: 22px;
    }

    @keyframes flicker {
      0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:.65} 94%{opacity:1} 97%{opacity:.8} 98%{opacity:1}
    }

    /* ── HERO IMAGE ── */
    .hero-wrap {
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(201,162,39,.2);
      box-shadow:
        0 0 30px rgba(0,0,0,.7),
        0 0 0 1px rgba(255,255,255,.04) inset;
      margin-bottom: 26px;
    }

    .hero-wrap img {
      width: 100%;
      display: block;
      filter: brightness(.92) contrast(1.06);
    }

    /* ── DIVIDER ── */
    .divider {
      width: 70%;
      max-width: 280px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,162,39,.55), transparent);
      margin-bottom: 26px;
    }

    /* ── BUTTONS ── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 100%;
      max-width: 420px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 18px 20px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(1rem, 4vw, 1.15rem);
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      position: relative;
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* active press effect for touch */
    .btn:active {
      transform: scale(.97);
    }

    /* Vídeo Instrução – neon azul */
    .btn-video {
      background: linear-gradient(135deg, #080f1e 0%, #0c1a30 100%);
      color: #7ec8ff;
      border: 1.5px solid rgba(30,144,255,.55);
      box-shadow:
        0 0 8px  rgba(30,144,255,.5),
        0 0 22px rgba(30,144,255,.28),
        0 0 50px rgba(30,144,255,.12),
        inset 0 0 14px rgba(30,144,255,.08);
    }

    /* Controle de Treinamento – neon vermelho */
    .btn-ctrl {
      background: linear-gradient(135deg, #180808 0%, #270b0b 100%);
      color: #ff8899;
      border: 1.5px solid rgba(255,34,68,.55);
      box-shadow:
        0 0 8px  rgba(255,34,68,.5),
        0 0 22px rgba(255,34,68,.28),
        0 0 50px rgba(255,34,68,.12),
        inset 0 0 14px rgba(255,34,68,.08);
    }

    .btn-icon {
      font-size: 1.25em;
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 30px;
      font-size: .65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(184,192,204,.25);
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- LOGO do GitHub -->
  <div class="logo-wrap">
    <img
      src="https://raw.githubusercontent.com/SEU_USUARIO/SEU_REPOSITORIO/main/logo.png"
      alt="Logo 2º BPM/I"
      onerror="this.parentElement.style.background='#1a1f2c'"
    />
  </div>

  <div class="title">Painel TCI 2026</div>
  <div class="subtitle">2º BPM/I &nbsp;·&nbsp; Polícia Militar &nbsp;·&nbsp; SP</div>

  <!-- IMAGEM PRINCIPAL do GitHub -->
  <div class="hero-wrap">
    <img
      src="https://github.com/5CiaPM/paineltci/issues/2"
      alt="Brasão 2º BPM/I"
      onerror="this.parentElement.style.display='none'"
    />
  </div>

  <div class="divider"></div>

  <div class="btn-group">
    <a
      class="btn btn-video"
      href="https://5ciapm.github.io/treinamentotci/"
      target="_blank"
      rel="noopener noreferrer"
    >
      <span class="btn-icon">▶</span>
      Vídeo Instrução
    </a>

    <a
      class="btn btn-ctrl"
      href="https://forms.gle/8pGX8b8JbQA5WxoRA"
      target="_blank"
      rel="noopener noreferrer"
    >
      <span class="btn-icon">📋</span>
      Controle de Treinamento
    </a>
  </div>

  <div class="footer">
    2º Batalhão de Polícia Militar do Interior<br/>
    São Paulo &nbsp;·&nbsp; 2026
  </div>

</div>
</body>
</html>
